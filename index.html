<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Guardrail Sales Pipeline 2026</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',Tahoma,'TH SarabunNew',Arial,sans-serif;background:#EEF2FF;color:#222;font-size:14px}
.hdr{background:linear-gradient(135deg,#0D47A1,#1565C0 55%,#1976D2);padding:18px 28px;color:#fff;box-shadow:0 4px 18px rgba(13,71,161,.35)}
.hdr-inner{max-width:1440px;margin:0 auto;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:12px}
.hdr-title{font-size:21px;font-weight:800;margin:2px 0}
.hdr-sub{font-size:11px;color:#BBDEFB;margin-top:3px}
.hdr-badge{font-size:10px;letter-spacing:2px;color:#90CAF9;font-weight:700;text-transform:uppercase;margin-bottom:3px}
.tabs{display:flex;gap:4px;background:rgba(255,255,255,.12);border-radius:10px;padding:4px;flex-wrap:wrap}
.tab{padding:7px 14px;border:none;cursor:pointer;font-size:12px;font-weight:700;border-radius:7px;background:transparent;color:#fff;font-family:inherit;transition:.2s}
.tab.on{background:rgba(255,255,255,.25)}
.fbar{background:#fff;border-bottom:1px solid #E8EAF6;padding:8px 28px;display:flex;gap:12px;align-items:center;flex-wrap:wrap}
.fg{display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.flbl{font-size:11px;color:#546E7A;font-weight:700;white-space:nowrap}
.fb{padding:3px 11px;border-radius:14px;border:none;cursor:pointer;font-size:11px;font-weight:700;background:#E8EAF6;color:#3949AB;font-family:inherit;transition:.2s}
.fb.on{background:#0D47A1;color:#fff}
.sep{height:18px;width:1px;background:#E0E0E0;flex-shrink:0}
.main{max-width:1440px;margin:0 auto;padding:18px 28px}
.kpi-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(155px,1fr));gap:11px;margin-bottom:16px}
.kpi{background:#fff;border-radius:12px;padding:14px 16px;box-shadow:0 2px 10px rgba(13,71,161,.07);border-left:4px solid;cursor:default;transition:transform .2s}
.kpi:hover{transform:translateY(-2px)}
.kpi-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:3px}
.kpi-lbl{font-size:10px;color:#78909C;font-weight:700;text-transform:uppercase;letter-spacing:.4px}
.kpi-val{font-size:21px;font-weight:800;line-height:1.1}
.kpi-note{font-size:10px;color:#90A4AE;margin-top:2px}
.kpi-gr{background:linear-gradient(135deg,#BF360C,#E65100);border-radius:12px;padding:14px 16px;box-shadow:0 2px 10px rgba(191,54,12,.22);color:#fff;cursor:default;transition:transform .2s}
.kpi-gr:hover{transform:translateY(-2px)}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.span2{grid-column:1/-1}
.card{background:#fff;border-radius:12px;padding:18px;box-shadow:0 2px 10px rgba(13,71,161,.07)}
.card h3{font-size:13px;font-weight:700;color:#1A237E;margin-bottom:12px}
.p-hot{background:#FFEBEE;color:#C62828;border-radius:6px;padding:2px 8px;font-size:10px;font-weight:800;white-space:nowrap;display:inline-block}
.p-fup{background:#FFFDE7;color:#F57F17;border-radius:6px;padding:2px 8px;font-size:10px;font-weight:800;white-space:nowrap;display:inline-block}
.p-new{background:#E8F5E9;color:#2E7D32;border-radius:6px;padding:2px 8px;font-size:10px;font-weight:800;white-space:nowrap;display:inline-block}
.s-win{background:#0D47A120;color:#0D47A1;border-radius:6px;padding:2px 8px;font-size:10px;font-weight:700;white-space:nowrap;display:inline-block}
.s-bid{background:#E6510020;color:#E65100;border-radius:6px;padding:2px 8px;font-size:10px;font-weight:700;white-space:nowrap;display:inline-block}
.bars{display:flex;flex-direction:column;gap:8px}
.brow{display:flex;align-items:center;gap:7px}
.blbl{font-size:11px;color:#37474F;font-weight:500;flex-shrink:0;text-align:right;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.btrk{flex:1;background:#E8EAF6;border-radius:16px;height:24px;overflow:hidden}
.bfil{height:100%;border-radius:16px;display:flex;align-items:center;padding-right:7px;justify-content:flex-end;min-width:22px}
.bfil span{color:#fff;font-size:10px;font-weight:700;white-space:nowrap}
.bval{font-size:10px;color:#546E7A;flex-shrink:0;width:64px;text-align:right}
.gr-box{background:linear-gradient(135deg,#BF360C,#E65100 55%,#F57C00);border-radius:12px;padding:18px;color:#fff;margin-bottom:14px}
.gr-kpis{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:9px;margin-bottom:12px}
.gr-kpi{background:rgba(255,255,255,.15);border-radius:9px;padding:11px 13px}
.gr-kl{font-size:10px;color:rgba(255,255,255,.8);font-weight:700;text-transform:uppercase;letter-spacing:.3px}
.gr-kv{font-size:19px;font-weight:800;color:#fff;margin:3px 0;line-height:1.1}
.gr-kn{font-size:10px;color:rgba(255,255,255,.7)}
.prop-wrap{background:rgba(255,255,255,.12);border-radius:9px;padding:11px 13px}
.prop-lbl{display:flex;justify-content:space-between;font-size:11px;margin-bottom:6px;flex-wrap:wrap;gap:3px}
.prop-trk{height:24px;background:rgba(0,0,0,.2);border-radius:12px;overflow:hidden;display:flex}
.prop-gr{height:100%;background:rgba(255,255,255,.85);border-radius:12px 0 0 12px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;color:#E65100;min-width:38px}
.prop-rest{flex:1;display:flex;align-items:center;justify-content:center;font-size:10px;color:rgba(255,255,255,.75);font-weight:600}
.li{display:flex;align-items:flex-start;gap:8px;padding:9px 0;border-bottom:1px solid #F0F0F0}
.li:last-child{border-bottom:none}
.rank{width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:800;flex-shrink:0;margin-top:2px}
.mpb{height:4px;background:#E8EAF6;border-radius:2px;margin-top:3px;overflow:hidden}
.mpf{height:100%;border-radius:2px;background:#E65100}
.contact-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.cc{border:1px solid #E8EAF6;border-radius:10px;padding:14px;transition:box-shadow .2s}
.cc:hover{box-shadow:0 4px 16px rgba(13,71,161,.12)}
.cc-row{display:flex;align-items:flex-start;gap:7px;margin-bottom:5px;font-size:12px;color:#546E7A}
.cc-ico{flex-shrink:0;font-size:13px}
.cc-txt{flex:1;min-width:0;word-break:break-word}
.tbl-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch;max-height:490px;overflow-y:auto}
table{width:100%;border-collapse:collapse;font-size:11px}
thead tr{background:#0D47A1;color:#fff;position:sticky;top:0;z-index:1}
th{padding:9px 10px;text-align:left;font-weight:700;white-space:nowrap}
.th-v{background:#1A237E}.th-m{background:#1B5E20}.th-gv{background:#BF360C}.th-gp{background:#4A148C}
tbody tr:nth-child(even){background:#F8F9FF}
tbody tr:hover{background:#E3F2FD}
td{padding:7px 10px;vertical-align:middle;border-bottom:1px solid #E8EAF6}
.strat{border-radius:12px;padding:16px;margin-bottom:12px}
.strat h4{font-size:13px;font-weight:800;margin-bottom:8px}
.strat p{font-size:12px;line-height:1.75;color:#37474F}
.s-red{background:#FFEBEE;border-left:4px solid #C62828}.s-red h4{color:#C62828}
.s-ora{background:#FFF8E1;border-left:4px solid #FF8F00}.s-ora h4{color:#E65100}
.s-grn{background:#E8F5E9;border-left:4px solid #2E7D32}.s-grn h4{color:#2E7D32}
.s-blu{background:#E3F2FD;border-left:4px solid #0D47A1}.s-blu h4{color:#0D47A1}
.funnel-item{border-radius:8px;padding:12px 16px;display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
footer{text-align:center;font-size:11px;color:#90A4AE;padding:14px 0;border-top:1px solid #E8EAF6;margin-top:18px}
@media(max-width:720px){.g2{grid-template-columns:1fr}.contact-grid{grid-template-columns:1fr}.hdr-inner{flex-direction:column;align-items:flex-start}}
</style>
</head>

<script>
var F = {priority:'all', stage:'all', region:'all', owner:'all'};
var TAB = 'pipeline';

var OWNER_MAP = {
  'sk1':'สำนักก่อสร้างทางที่ 1 (ทล.)',
  'sk2':'สำนักก่อสร้างทางที่ 2 (ทล.)',
  'drr':'กรมทางหลวงชนบท (ทช.)',
  'hwy':'แขวงทางหลวง (ทล.)',
  'pao':'อบจ.'
};
var REGION_MAP = {
  'c':'ภาคกลาง/เหนือตอนล่าง',
  'ne':'ภาคอีสาน',
  's':'ภาคใต้',
  'n':'ภาคเหนือ'
};
var PRIORITY_MAP = {
  'hot':'🔴 เร่งด่วนมาก',
  'fup':'🟡 ติดตาม',
  'new':'🟢 รายการใหม่'
};

function setF(k, v, btn) {
  F[k] = v;
  var prefix = {priority:'fp', stage:'fs', region:'fr', owner:'fo'}[k];
  document.querySelectorAll('[id^="' + prefix + '"]').forEach(function(b){ b.classList.remove('on'); });
  btn.classList.add('on');
  draw();
}

function showTab(t) {
  TAB = t;
  document.querySelectorAll('.tab').forEach(function(b){ b.classList.remove('on'); });
  var el = document.getElementById('tab-' + t);
  if (el) el.classList.add('on');
  draw();
}

function fd() {
  return ALL.filter(function(d) {
    var okP = F.priority === 'all' || d.priorityLabel === PRIORITY_MAP[F.priority];
    var okS = F.stage === 'all' ||
              (F.stage === 'win' && d.stage === 'ผลการประมูล') ||
              (F.stage === 'bid' && d.stage === 'ประมูล');
    var okR = F.region === 'all' || d.region === REGION_MAP[F.region];
    var okO = F.owner === 'all' || d.ownerType === OWNER_MAP[F.owner];
    return okP && okS && okR && okO;
  });
}

function sm(arr, key) {
  return arr.reduce(function(s, x){ return s + (parseFloat(x[key]) || 0); }, 0);
}
function f2(n) { return (n === null || n === undefined) ? '-' : Number(n).toFixed(2); }
function f1(n) { return (n === null || n === undefined) ? '-' : Number(n).toFixed(1); }
function fn(n) { return (n === null || n === undefined) ? '-' : Math.round(n).toLocaleString(); }
function pct(v, t) { return t > 0 ? v / t * 100 : 0; }
function esc(s) {
  return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

var STGC = {'ผลการประมูล':'#0D47A1','ประมูล':'#E65100'};
var STGBG = {'ผลการประมูล':'#E3F2FD','ประมูล':'#FFF3E0'};
var REGS = ['ภาคกลาง/เหนือตอนล่าง','ภาคอีสาน','ภาคใต้','ภาคเหนือ'];
var REGC = ['#0D47A1','#E65100','#2E7D32','#1976D2'];
var OTYPES = ['สำนักก่อสร้างทางที่ 1 (ทล.)','สำนักก่อสร้างทางที่ 2 (ทล.)','กรมทางหลวงชนบท (ทช.)','แขวงทางหลวง (ทล.)','อบจ.','เทศบาล','อบต.','กรมชลประทาน','ศูนย์สร้างทาง','อื่นๆ'];
var OTYPEC = ['#7B1FA2','#6A1B9A','#0D47A1','#1565C0','#E65100','#2E7D32','#558B2F','#00695C','#4E342E','#546E7A'];

function pbadge(lbl) {
  if (lbl === '🔴 เร่งด่วนมาก') return '<span class="p-hot">' + lbl + '</span>';
  if (lbl === '🟡 ติดตาม') return '<span class="p-fup">' + lbl + '</span>';
  return '<span class="p-new">' + lbl + '</span>';
}
function sbadge(s) {
  return s === 'ผลการประมูล' ? '<span class="s-win">ผลการประมูล</span>' : '<span class="s-bid">ประมูล</span>';
}

function barChart(rows, maxV, lblW) {
  var h = '<div class="bars">';
  rows.forEach(function(r) {
    var w = maxV > 0 ? Math.max(3, r.v / maxV * 100) : 0;
    h += '<div class="brow">';
    h += '<div class="blbl" style="width:' + lblW + 'px" title="' + esc(r.n) + '">' + esc(r.n) + '</div>';
    h += '<div class="btrk"><div class="bfil" style="width:' + w + '%;background:' + r.c + '"><span>' + esc(r.tag) + '</span></div></div>';
    h += '<div class="bval">' + r.val + '</div>';
    h += '</div>';
  });
  return h + '</div>';
}

function kpiCard(lbl, val, note, col, ico, gr) {
  if (gr) {
    return '<div class="kpi-gr"><div class="kpi-top"><span class="kpi-lbl" style="color:rgba(255,255,255,.8)">' + lbl + '</span><span>' + ico + '</span></div><div class="kpi-val">' + val + '</div><div class="kpi-note">' + note + '</div></div>';
  }
  return '<div class="kpi" style="border-color:' + col + '"><div class="kpi-top"><span class="kpi-lbl">' + lbl + '</span><span>' + ico + '</span></div><div class="kpi-val" style="color:' + col + '">' + val + '</div><div class="kpi-note">' + note + '</div></div>';
}

function draw() {
  var d = fd();
  var totP = sm(d, 'value');
  var totM = sm(d, 'meters');
  var totGR = sm(d, 'grV');
  var grPct = pct(totGR, totP);
  var hot = d.filter(function(x){ return x.priorityLabel === '🔴 เร่งด่วนมาก'; });
  var withW = d.filter(function(x){ return x.hasWinner; });

  var H = '';

  // ── KPI ROW ──
  H += '<div class="kpi-grid">';
  H += kpiCard('Pipeline ทั้งหมด', d.length + ' โครงการ', 'GUARDRAIL2026', '#0D47A1', '📁', false);
  H += kpiCard('มูลค่าโครงการรวม', f1(totP) + ' M', 'ล้านบาท', '#1565C0', '💰', false);
  H += kpiCard('🔴 เร่งด่วน (ปิดได้เลย)', hot.length + ' โครงการ', f2(sm(hot,'grV')) + ' M GR · ' + fn(sm(hot,'meters')) + ' ม.', '#C62828', '🚨', false);
  H += kpiCard('รู้ชื่อผู้รับเหมา', withW.length + ' โครงการ', fn(sm(withW,'meters')) + ' ม. GR', '#7B1FA2', '👤', false);
  H += kpiCard('มูลค่า Guardrail รวม', f2(totGR) + ' M', 'ล้านบาท @ 1,790 บาท/ม.', '', '🛡️', true);
  H += '</div>';

  // ══ PIPELINE ══
  if (TAB === 'pipeline') {
    var stWin = d.filter(function(x){ return x.stage === 'ผลการประมูล'; });
    var stBid = d.filter(function(x){ return x.stage === 'ประมูล'; });
    var funnelRows = [
      {lbl:'📋 Pipeline ทั้งหมด', n:d.length, m:totM, g:totGR, c:'#37474F', bg:'#ECEFF1'},

    H += '<div class="card span2" style="margin-top:14px"><h3>🏆 Top 15 เร่งด่วน — GR ระยะสูงสุด (ผลการประมูล + รู้ชื่อผู้รับเหมา)</h3>';
    hotP.slice(0,15).forEach(function(x, i) {
      H += '<div class="li">';
      H += '<div class="rank" style="background:' + (i<3?'#C62828':'#FFEBEE') + ';color:' + (i<3?'#fff':'#C62828') + '">' + (i+1) + '</div>';
      H += '<div style="flex:1;min-width:0">';
      H += '<div style="font-size:12px;font-weight:700;color:#1A237E;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">' + esc(x.name) + '</div>';
      H += '<div style="font-size:10px;color:#546E7A;margin-top:2px">' + esc(x.province) + ' · ' + esc(x.ownerOrg) + '</div>';
      H += '<div style="font-size:11px;color:#7B1FA2;margin-top:2px;font-weight:700">🏗️ ' + esc(x.winnerOrg || '—') + '</div>';
      if (x.winnerPhone) H += '<div style="font-size:11px;color:#2E7D32">📞 ' + esc(x.winnerPhone) + '</div>';
      H += '</div>';
      H += '<div style="text-align:right;flex-shrink:0;padding-left:12px">';
      H += '<div style="font-size:20px;font-weight:800;color:#E65100">' + fn(x.meters) + '</div>';
      H += '<div style="font-size:9px;color:#78909C">เมตร GR</div>';
      H += '<div style="font-size:12px;font-weight:700;color:#0D47A1">' + f2(x.grV) + ' M</div>';
      H += '<div style="font-size:10px;color:#78909C">สิ้นสุด: ' + esc(x.end) + '</div>';
      H += '</div></div>';
    });
    H += '</div></div>';
  }

  // ══ PROJECTS ══
  if (TAB === 'projects') {
    var sorted = d.slice().sort(function(a,b){ return b.priority - a.priority || (b.meters||0) - (a.meters||0); });
    H += '<div class="card">';
    H += '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;flex-wrap:wrap;gap:8px">';
    H += '<h3 style="margin:0">📋 รายการโครงการทั้งหมด — ' + d.length + ' รายการ</h3>';
    H += '<div style="font-size:11px;color:#78909C">มูลค่า <b style="color:#0D47A1">' + f1(totP) + ' M</b> · GR <b style="color:#E65100">' + f2(totGR) + ' M</b> · <b style="color:#7B1FA2">' + f1(grPct) + '%</b></div></div>';
    H += '<div class="tbl-wrap"><table>';
    H += '<thead><tr><th>#</th><th>Priority</th><th>โครงการ</th><th>จ.ว.</th><th>ขั้นตอน</th><th>หน่วยงาน</th><th class="th-v">มูลค่า (M)</th><th class="th-m">GR (ม.)</th><th class="th-gv">GR (M)</th><th class="th-gp">GR %</th><th>ผู้รับเหมา</th><th>โทร</th><th>สิ้นสุด</th></tr></thead><tbody>';
    sorted.forEach(function(x, i) {
      H += '<tr>';
      H += '<td style="color:#90A4AE">' + (i+1) + '</td>';
      H += '<td>' + pbadge(x.priorityLabel) + '</td>';
      H += '<td style="min-width:180px;max-width:230px"><div style="font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">' + esc(x.name) + '</div><div style="font-size:9px;color:#90A4AE">' + esc(x.id) + '</div></td>';
      H += '<td style="font-weight:700;color:#1A237E;white-space:nowrap;font-size:11px">' + esc(x.province) + '</td>';
      H += '<td>' + sbadge(x.stage) + '</td>';
      H += '<td style="font-size:10px;color:#546E7A;max-width:130px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">' + esc(x.ownerOrg) + '</td>';
      H += '<td style="text-align:right;font-weight:800;color:' + (x.value>=500?'#BF360C':'#0D47A1') + '">' + Number(x.value).toFixed(2) + '</td>';
      H += '<td style="text-align:right;font-weight:800;color:#2E7D32">' + fn(x.meters) + '</td>';
      H += '<td style="text-align:right;font-weight:800;color:#E65100">' + f2(x.grV) + '</td>';
      H += '<td style="text-align:right;font-weight:800;color:#7B1FA2">' + f1(x.grP) + '%</td>';
      H += '<td style="font-size:10px;color:#7B1FA2;max-width:130px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">' + esc(x.winnerOrg || '—') + '</td>';
      H += '<td style="white-space:nowrap">' + (x.winnerPhone ? '<a href="tel:' + esc(x.winnerPhone) + '" style="color:#0D47A1;font-size:11px;font-weight:700">' + esc(x.winnerPhone) + '</a>' : '<span style="color:#B0BEC5">—</span>') + '</td>';
      H += '<td style="font-size:10px;color:#78909C;white-space:nowrap">' + esc(x.end) + '</td></tr>';
    });
    H += '</tbody></table></div></div>';
  }

  H += '<footer>Guardrail Sales Pipeline Dashboard · iCONS · ข้อมูล ณ 22 เม.ย. 2569 · ราคา 1,790 บาท/เมตร</footer>';
  document.getElementById('app').innerHTML = H;
}

draw();
</script>
